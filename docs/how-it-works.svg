<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" width="880" height="410" role="img"
     aria-label="How Legato works: an employer deposits pathUSD into a shared Asset Privacy Pool (built with Noir and Solidity, settled on Tempo Testnet); the pool pays out privately to multiple employees, each withdrawing with a zero-knowledge proof.">
  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .label { fill: #6b7280; }
    </style>
    <linearGradient id="tempoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#0b1220" fill-opacity="0.05"/>
    </pattern>
    <symbol id="user" viewBox="0 0 24 24">
      <path fill="#ffffff" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.68 18.68 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695z"/>
    </symbol>
  </defs>

  <!-- backdrop -->
  <rect x="0.5" y="0.5" width="879" height="409" rx="24" fill="#fafafa" stroke="#ececf0"/>
  <rect x="0.5" y="0.5" width="879" height="409" rx="24" fill="url(#dots)"/>

  <!-- structural connectors (behind cards) -->
  <g stroke="#e5e7eb" stroke-width="1.5" fill="none">
    <!-- pool -> tempo spine -->
    <path d="M440 240 V300"/>
  </g>

  <!-- deposit flow (employer -> pool) -->
  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <path d="M96 200 H150"/>
    <path d="M258 200 H311"/>
  </g>
  <path d="M315 200 l-10 -5.5 v11 z" fill="#94a3b8"/>

  <!-- withdraw flow (pool -> many employees) -->
  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <!-- distribution bus off the pool's right edge -->
    <path d="M565 200 H590"/>
    <path d="M590 100 V300"/>
    <!-- one lane per employee -->
    <path d="M590 100 H625"/>
    <path d="M590 200 H625"/>
    <path d="M590 300 H625"/>
    <path d="M721 100 H784"/>
    <path d="M721 200 H784"/>
    <path d="M721 300 H784"/>
  </g>
  <path d="M788 100 l-10 -5.5 v11 z" fill="#94a3b8"/>
  <path d="M788 200 l-10 -5.5 v11 z" fill="#94a3b8"/>
  <path d="M788 300 l-10 -5.5 v11 z" fill="#94a3b8"/>

  <!-- asset privacy pool (the hub) -->
  <rect x="315" y="160" width="250" height="80" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text class="sans" x="440" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">Asset Privacy Pool</text>
  <text class="sans" x="440" y="217" text-anchor="middle" font-size="12" fill="#047857">Built with Noir and Solidity</text>

  <!-- tempo settlement (the anchor block) -->
  <rect x="350" y="300" width="180" height="56" rx="14" fill="url(#tempoGrad)"/>
  <text class="sans" x="440" y="333" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Tempo Testnet</text>

  <!-- employer (deposit) -->
  <circle cx="70" cy="200" r="24" fill="#fb7185"/>
  <use href="#user" x="58" y="188" width="24" height="24"/>
  <text class="sans label" x="70" y="244" text-anchor="middle" font-size="11.5" font-weight="500">Employer</text>
  <rect x="150" y="184" width="108" height="32" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text class="sans" x="204" y="204" text-anchor="middle" font-size="12.5" font-weight="500" fill="#475569">Deposit</text>

  <!-- employees (withdraw) -->
  <text class="sans label" x="810" y="60" text-anchor="middle" font-size="12" font-weight="500">Employees</text>

  <rect x="625" y="84" width="96" height="32" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text class="sans" x="673" y="104" text-anchor="middle" font-size="12.5" font-weight="500" fill="#475569">Withdraw</text>
  <circle cx="810" cy="100" r="22" fill="#8b5cf6"/>
  <use href="#user" x="799" y="89" width="22" height="22"/>

  <rect x="625" y="184" width="96" height="32" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text class="sans" x="673" y="204" text-anchor="middle" font-size="12.5" font-weight="500" fill="#475569">Withdraw</text>
  <circle cx="810" cy="200" r="22" fill="#f59e0b"/>
  <use href="#user" x="799" y="189" width="22" height="22"/>

  <rect x="625" y="284" width="96" height="32" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text class="sans" x="673" y="304" text-anchor="middle" font-size="12.5" font-weight="500" fill="#475569">Withdraw</text>
  <circle cx="810" cy="300" r="22" fill="#38bdf8"/>
  <use href="#user" x="799" y="289" width="22" height="22"/>
</svg>
